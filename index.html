<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知更鸟书店的春天 · 一场漫长的告白</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=Ma+Shan+Zheng&family=Long+Cang&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- 标题封面 -->
        <section id="cover" class="screen active">
            <div class="cover-inner">
                <p class="cover-sub">一部互动轻小说</p>
                <h1 class="cover-title">知更鸟书店的春天</h1>
                <p class="cover-desc">
                    关于一个总是踮脚够书的女孩，<br>
                    和一场她藏了很久的告白。<br><br>
                    <em>"这是一封给晚安的情书"</em>
                </p>
                <div class="cover-buttons">
                    <button class="btn-start" id="btnStart">翻开第一页</button>
                    <button class="btn-continue hidden" id="btnContinue">继续上次阅读</button>
                </div>
                <p class="cover-foot">建议佩戴耳机 · 全程约 25 分钟</p>
            </div>
        </section>

        <!-- 游戏主界面 -->
        <section id="game" class="screen">
            <header class="topbar">
                <span class="chapter-name" id="chapterName">序章</span>
                <button class="btn-restart" id="btnRestart" title="重新开始">↺</button>
            </header>

            <main class="stage" id="stage">
                <div class="bg-vignette"></div>
                <div class="petals" id="petals"></div>
                <div class="narration" id="narration"></div>
            </main>

            <footer class="dialogue-box">
                <div class="speaker" id="speaker"></div>
                <div class="text" id="dialogueText"></div>
                <div class="choices" id="choices"></div>
                <div class="click-hint" id="clickHint">▼ 点击继续</div>
            </footer>
        </section>

        <!-- 结局画面 -->
        <section id="ending" class="screen">
            <div class="ending-inner">
                <h2 id="endingTitle"></h2>
                <p id="endingText"></p>
                <button class="btn-start" id="btnReplay">再读一遍</button>
            </div>
        </section>
    </div>

    <script src="js/story.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
